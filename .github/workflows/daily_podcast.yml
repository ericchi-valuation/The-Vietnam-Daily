name: Vietnam Daily Auto Podcast Generator

on:
  schedule:
    # 23:00 UTC = 06:00 越南標準時間 (ICT, UTC+7)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  build_podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 下載專案程式碼
        uses: actions/checkout@v4
        
      - name: 🐍 設定 Python 執行環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: ⚙️ Setup ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: ⚙️ Verify ffmpeg
        run: ffmpeg -version

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
        
      - name: 🎙️ 執行主要生成腳本 (AI寫稿、AI編輯、生成語音、混音、發送Email/Threads)
        timeout-minutes: 30
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python main.py

      - name: 📤 打包並上傳生成的稿件與音檔 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: VietnamDaily-Outputs
          path: |
            script.txt
            summary.txt
            VietnamDaily_Podcast.mp3
            VietnamDaily_Podcast_Final.mp3
          retention-days: 7 

      - name: 🚀 打包 MP3 上傳至 GitHub Releases 並更新 RSS (feed.xml)
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(TZ='Asia/Ho_Chi_Minh' date +'%Y-%m-%d')
          ISO_DATE=$(TZ='Asia/Ho_Chi_Minh' date +'%Y-%m-%dT%H:%M:%S+07:00')
          
          echo "==== 計算音檔長度與大小 ===="
          DURATION=$(ffprobe -i VietnamDaily_Podcast_Final.mp3 -show_entries format=duration -v quiet -of csv="p=0" | cut -d'.' -f1)
          if [ -z "$DURATION" ]; then DURATION=600; fi
          FORMATTED_DURATION=$(printf "%02d:%02d:%02d\n" $(($DURATION/3600)) $(($DURATION%3600/60)) $(($DURATION%60)))
          FILE_SIZE=$(stat -c%s "VietnamDaily_Podcast_Final.mp3")
          
          echo "==== 上傳音檔至 GitHub Release ===="
          gh release create "ep-${TODAY}" VietnamDaily_Podcast_Final.mp3 --title "越南晨間快訊 Good Morning Vietnam - ${TODAY}" --notes "Auto-generated daily podcast." || true
          
          echo "==== 更新 RSS Feed ===="
          URL="https://github.com/${{ github.repository }}/releases/download/ep-${TODAY}/VietnamDaily_Podcast_Final.mp3"
          
          python core/rss_generator.py \
            --title "越南晨間快訊 Good Morning Vietnam - ${TODAY}" \
            --summary-file summary.txt \
            --date "$ISO_DATE" \
            --url "$URL" \
            --duration "$FORMATTED_DURATION" \
            --size "$FILE_SIZE"

      - name: 💾 將最新的 RSS XML 存檔 Commit 到專案中
        run: |
          TODAY=$(TZ='Asia/Ho_Chi_Minh' date +'%Y-%m-%d')
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed.xml episodes.json
          git commit -m "Auto-update podcast feed for ${TODAY}" || exit 0
          git pull --rebase origin main --autostash
          git push
